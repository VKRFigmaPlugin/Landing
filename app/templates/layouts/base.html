<!DOCTYPE html>
<html lang="ru">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='images/logo.svg') }}">

  <script>
    (function() {
      var storageKey = 'preferred-theme';
      var theme = 'dark';

      try {
        var savedTheme = localStorage.getItem(storageKey);
        var prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;

        if (savedTheme === 'light' || savedTheme === 'dark') {
          theme = savedTheme;
        } else if (prefersLight) {
          theme = 'light';
        }
      } catch (error) {}

      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>

  <link rel="stylesheet" href="{{ url_for('static', filename='styles/styles.css') }}">

  
  {% block title %}
    {% endblock %}
</head>
<body id="body">
<div class="main__container">
{% include 'components/elements/header.html' %}

{% block body %}
{% endblock %}

{% include 'components/elements/footer.html' %}
</div>

<script src="{{ url_for('static', filename='js/theme-toggle.js') }}"></script>
<script src="{{ url_for('static', filename='js/header-menu.js') }}"></script>
<script src="{{ url_for('static', filename='js/horizontal-scroll-lock.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
