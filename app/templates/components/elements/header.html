<header class="header" data-header>
  <div class="header__container">
    <div class="header__logo">
      <a href="{{ url_for('index') }}" class="logo-text">
          <img src="{{ url_for('static', filename='images/logo.svg') }}" alt="">
      </a>
    </div>

    <nav class="header__nav" id="header-navigation" aria-label="Основная навигация">
      <div class="header__mobile-pages" aria-label="Навигация по страницам">
        <a
          href="{{ url_for('index') }}"
          class="header__mobile-page-link{% if request.endpoint == 'index' %} is-active{% endif %}"
        >
          Главная
        </a>
        <a
          href="{{ url_for('about') }}"
          class="header__mobile-page-link{% if request.endpoint == 'about' %} is-active{% endif %}"
        >
          О нас
        </a>
      </div>

      <ul class="nav-list">
        <li class="nav-item"><a href="{{ url_for('index') }}#pain-points" class="nav-link">Проблемы</a></li>
        <li class="nav-item"><a href="{{ url_for('index') }}#features" class="nav-link">Что делает плагин</a></li>
        <li class="nav-item"><a href="{{ url_for('index') }}#target-audience" class="nav-link">Для кого плагин</a></li>
        <li class="nav-item"><a href="{{ url_for('index') }}#team" class="nav-link">О команде</a></li>
        <li class="nav-item"><a href="{{ url_for('index') }}#faq" class="nav-link">FAQ</a></li>
      </ul>

      <div class="header__mobile-actions">
        <button type="button" class="btn btn--primary">Попробовать плагин</button>
      </div>
    </nav>

    <div class="header__controls">
      <div class="header__actions">
        <button type="button" class="btn btn--primary">Попробовать плагин</button>
      </div>

      <button
        type="button"
        class="header__burger"
        aria-label="Открыть меню"
        aria-expanded="false"
        aria-controls="header-navigation"
      >
        <span class="header__burger-line"></span>
        <span class="header__burger-line"></span>
        <span class="header__burger-line"></span>
      </button>
    </div>
  </div>

  <div class="header__overlay" aria-hidden="true"></div>
</header>
